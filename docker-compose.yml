services:
  backend:
    build: ./backend
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  gobalancer:
    build: .                     # assuming your gobalancer Dockerfile is in the root
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKENDS=http://backend:9000,http://backend:9001   # ← THIS IS THE KEY CHANGE